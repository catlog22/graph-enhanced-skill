# OpenAI Codex 平台配置
version: 1
platform: codex

tools:
  agent:
    resolve: "codex '{{prompt}}'"
  ask:
    resolve: native
  search:
    resolve: "rg --json '{{query}}'"
    output: json
  review:
    resolve: "codex --review '{{prompt}}'"
  test:
    resolve: "npm test"

aliases:
  ask_user: request_user_input
  spawn_agent: codex
  search_code: grep
  read_file: read_file
  write_file: write_file
  edit_file: apply_diff
  run_command: shell
