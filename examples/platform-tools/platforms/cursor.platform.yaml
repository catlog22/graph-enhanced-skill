# Cursor 平台配置
version: 1
platform: cursor

tools:
  agent:
    resolve: "cursor agent --type {{role}} --mode {{mode}}"
  ask:
    resolve: native
  search:
    resolve: "cursor search '{{query}}'"
    output: json
  review:
    resolve: "cursor agent --type review"
  test:
    resolve: "npm test"

aliases:
  ask_user: ask_followup
  spawn_agent: run_terminal_cmd
  search_code: codebase_search
  read_file: read_file
  write_file: create_file
  edit_file: edit_file
  run_command: run_terminal_cmd
