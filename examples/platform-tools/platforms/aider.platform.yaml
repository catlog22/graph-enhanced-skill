# Aider 平台配置 — 同一个 GES 图，换平台只换此文件
version: 1
platform: aider

tools:
  agent:
    resolve: "aider /{{role}}"
    input: stdin
  ask:
    resolve: native
  search:
    resolve: "rg --json '{{query}}'"
    output: json
  review:
    resolve: "aider /review"
    input: stdin
  test:
    resolve: "npm test"

aliases:
  ask_user: input
  spawn_agent: aider
  search_code: rg
  read_file: cat
  write_file: write
  edit_file: aider
  run_command: shell
