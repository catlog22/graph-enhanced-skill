# Review loop — implement, review, fix until pass
schema: ges/1.1
meta: { name: review-loop, entry: implement, terminal: [end] }

bindings:
  reviewer: "maestro delegate --role review --mode analysis"

nodes:
  implement:
    actions:
      - id: code
        prompt: 按需求实现代码变更

  review:
    actions:
      - id: check
        run: "reviewer"
        prompt: 审查代码变更，检查正确性和风格
        output: [review_result]
        tools:
          - name: verdict
            schema:
              type: object
              required: [pass]
              properties:
                pass: { type: boolean }
                issues: { type: array, items: { type: string } }

  fix:
    actions:
      - id: apply
        prompt: |
          修复以下问题：
          {{review_result.issues}}

edges:
  - { from: implement, to: review }
  - { from: review, to: end,       when: "review_result.pass" }
  - { from: review, to: fix,       when: "!review_result.pass && retries < 3" }
  - { from: review, to: end,       when: "retries >= 3" }
  - { from: fix,    to: review }
