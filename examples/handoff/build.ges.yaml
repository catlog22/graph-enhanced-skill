# 构建 skill — 完成后交接给 deploy
# meta.output 声明导出变量，handoff 自动传递
schema: ges/1.1
meta:
  name: build
  entry: compile
  terminal: [done]
  output: [artifact_path, test_passed, version]

nodes:
  compile:
    actions:
      - id: build
        prompt: 编译项目
        output: [artifact_path]

      - id: test
        prompt: 运行测试
        output: [test_passed]

      - id: tag
        prompt: 生成版本号
        output: [version]

edges:
  - from: compile
    to: done
    handoff: ./deploy.ges.yaml
