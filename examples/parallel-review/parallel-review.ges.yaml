# Parallel code review — fork/join/goal demo
schema: ges/1.1

meta:
  name: parallel-review
  entry: intake
  terminal: [end]
  goal: "lint.pass && tests.pass && review.pass"

bindings:
  reviewer: "maestro delegate --role review --mode analysis"

nodes:
  intake:
    actions:
      - id: parse
        prompt: 解析需求，确定待审查范围
        output: [task]

  lint:
    actions:
      - id: run
        run: "npm run lint -- --json"
        output: [lint]

  tests:
    actions:
      - id: run
        run: "npm test -- --json"
        output: [tests]

  review:
    actions:
      - id: check
        run: "reviewer"
        prompt: 审查 {{task}} 的代码质量
        output: [review]

  decide:
    actions:
      - id: merge
        prompt: 汇总 lint={{lint}}, tests={{tests}}, review={{review}}

  fix:
    actions:
      - id: patch
        prompt: 修复未通过的检查项

edges:
  # fork — 三节点并行执行
  - { from: intake, to: [lint, tests, review] }

  # join — 等待全部完成后汇聚
  - { from: [lint, tests, review], to: decide }

  # goal-driven 路由
  - { from: decide, to: end, when: "goal" }
  - { from: decide, to: fix, when: "!goal && iteration < 3" }
  - { from: decide, to: end, when: "iteration >= 3" }

  # 修复后重新并行检查
  - { from: fix, to: [lint, tests, review] }
